<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <title>P2P Call</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />

    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --muted: #64748b;
            --primary: #6366f1;
            --primary-hov: #4f46e5;
            --primary-lt: #eef2ff;
            --primary-tx: #4338ca;
            --shadow: 0 1px 3px rgba(0, 0, 0, .08), 0 1px 2px rgba(0, 0, 0, .04);
            --r: 12px;
            --r-sm: 8px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            padding: 0 16px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .topbar-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .topbar-action {
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            padding: 5px 11px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg);
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .home-card {
            max-width: 400px;
            margin: 48px auto;
            text-align: center;
            padding: 40px 28px 32px;
        }

        .hero-icon {
            font-size: 56px;
            margin-bottom: 14px;
        }

        .page-h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .page-sub {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 22px;
        }

        .card-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: .15s;
            white-space: nowrap;
            user-select: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hov);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary-lt);
        }

        .btn-full {
            width: 100%;
        }

        .link-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 9px 12px;
            margin-top: 10px;
        }

        .link-box input {
            flex: 1;
            min-width: 0;
            background: none;
            border: none;
            color: var(--primary-tx);
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .copy-btn {
            font-size: 11px;
            color: var(--muted);
            cursor: pointer;
            padding: 4px 9px;
            border-radius: 6px;
            background: var(--card);
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: var(--primary-lt);
            border-color: var(--primary);
            color: var(--primary-tx);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .hidden {
            display: none !important;
        }

        body.in-room {
            overflow: hidden;
        }

        body.in-room .topbar,
        body.in-room .container {
            display: none;
        }

        .room {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #080c10;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        body.in-room .room {
            display: flex;
        }

        #remote-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0d1520;
        }

        .room-waiting {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            pointer-events: none;
        }

        .room-waiting-ring {
            width: 64px;
            height: 64px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .room-header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 40px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.65) 0%, transparent 100%);
            pointer-events: none;
        }

        .room-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            font-weight: 600;
        }

        #call-status {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 5px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .video-self {
            position: absolute;
            right: 16px;
            bottom: 100px;
            width: 110px;
            height: 148px;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.22);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
            z-index: 10;
            background: #1a1f28;
            cursor: pointer;
        }

        #local-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform: scaleX(-1);
        }

        .video-label {
            position: absolute;
            bottom: 6px;
            left: 7px;
            padding: 2px 7px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.55);
            color: rgba(255, 255, 255, 0.88);
            font-size: 10px;
            font-weight: 600;
            pointer-events: none;
        }

        .call-controls {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 10px 20px;
            border-radius: 999px;
            background: rgba(8, 12, 16, 0.72);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .call-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: background 0.18s ease, transform 0.18s ease;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }

        .call-btn:active {
            transform: scale(0.88);
        }

        .call-btn-default {
            background: rgba(255, 255, 255, 0.16);
            color: white;
        }

        .call-btn-off {
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.4);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
        }

        .call-btn-end {
            background: #ef4444;
            color: white;
            width: 60px;
            height: 60px;
        }

        #call-debug {
            display: none;
            position: absolute;
            left: 12px;
            bottom: 12px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            z-index: 5;
            max-width: calc(100% - 160px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            pointer-events: none;
        }

        .room[data-debug="true"] #call-debug {
            display: block;
        }

        @media (max-width: 680px) {
            .video-self {
                width: 88px;
                height: 118px;
                bottom: 90px;
                right: 12px;
            }

            .call-controls {
                bottom: 20px;
                gap: 10px;
                padding: 8px 16px;
            }

            .call-btn {
                width: 46px;
                height: 46px;
            }

            .call-btn-end {
                width: 54px;
                height: 54px;
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <a href="/" class="topbar-logo">
            <svg width="26" height="26" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="192" height="192" rx="40" fill="#6366f1" />
                <circle cx="72" cy="76" r="22" fill="rgba(255,255,255,.95)" />
                <path d="M32 148c0-22 18-38 40-38s40 16 40 38" fill="rgba(255,255,255,.95)" />
                <circle cx="128" cy="76" r="22" fill="rgba(255,255,255,.7)" />
                <path d="M88 148c0-22 18-38 40-38s40 16 40 38" fill="rgba(255,255,255,.7)" />
            </svg>
            One2One
        </a>
        <a class="topbar-action" href="/">Новая встреча</a>
    </header>

    <main class="container">
        <section id="homePanel" class="card home-card">
            <div class="hero-icon">📹</div>
            <h1 class="page-h1">One2One</h1>
            <p class="page-sub">Видеозвонок один на один без регистрации</p>
            <button class="btn btn-primary btn-full" id="createRoomBtn" type="button">Создать встречу</button>
        </section>

        <section id="invitePanel" class="hidden">
            <h1 class="page-h1">Ссылка для звонка</h1>
            <p class="page-sub">Отправьте ссылку собеседнику, затем войдите в комнату</p>

            <div class="card">
                <div class="card-label">Ссылка</div>
                <div class="link-box">
                    <input id="roomLink" readonly onclick="this.select()" />
                    <button id="copyLinkBtn" class="copy-btn" type="button">Копировать</button>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="enterRoomBtn" type="button">Войти в комнату</button>
                <button class="btn btn-outline" id="newRoomBtn" type="button">На главную</button>
            </div>
        </section>
    </main>

    <section class="room" id="roomView" data-room>
        <video id="remote-video" autoplay playsinline controls></video>

        <div class="room-waiting" id="room-waiting">
            <div class="room-waiting-ring"></div>
            <span>Ожидание собеседника...</span>
        </div>

        <div class="room-header">
            <span class="room-title">One2One</span>
            <span id="call-status">Подключение</span>
        </div>

        <div class="video-self" title="Вы">
            <video id="local-video" autoplay playsinline muted></video>
            <span class="video-label">Вы</span>
        </div>

        <div class="call-controls">
            <button class="call-btn call-btn-default" id="toggle-mic" type="button" title="Микрофон">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="2" width="6" height="11" rx="3" />
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                    <line x1="12" y1="19" x2="12" y2="22" />
                    <line x1="8" y1="22" x2="16" y2="22" />
                </svg>
            </button>

            <button class="call-btn call-btn-end" id="finish-call" type="button" title="Завершить звонок">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.42 19.42 0 0 1 4.43 9.68a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.34 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.32 8.91a16 16 0 0 0 3.36 4.4z" />
                    <line x1="23" y1="1" x2="1" y2="23" />
                </svg>
            </button>

            <button class="call-btn call-btn-default" id="toggle-camera" type="button" title="Камера">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 7l-7 5 7 5V7z" />
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                </svg>
            </button>
        </div>

        <div id="call-debug"></div>
    </section>

    <script>
        const params = new URLSearchParams(location.search);

        let appConfig = {
            baseUrl: "",
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:global.stun.twilio.com:3478" }
            ]
        };

        let room = params.get("room");
        let token = params.get("token");

        let ws;
        let pc;
        let localStream;
        let remoteStream;
        let pendingIceCandidates = [];
        let callRequested = false;
        let makingOffer = false;
        let ignoreOffer = false;

        const homePanel = document.getElementById("homePanel");
        const invitePanel = document.getElementById("invitePanel");
        const roomView = document.getElementById("roomView");
        const waitingEl = document.getElementById("room-waiting");
        const localVideo = document.getElementById("local-video");
        const remoteVideo = document.getElementById("remote-video");
        const roomLink = document.getElementById("roomLink");
        const statusEl = document.getElementById("call-status");
        const debugEl = document.getElementById("call-debug");
        const createRoomBtn = document.getElementById("createRoomBtn");
        const copyLinkBtn = document.getElementById("copyLinkBtn");
        const enterRoomBtn = document.getElementById("enterRoomBtn");
        const newRoomBtn = document.getElementById("newRoomBtn");
        const micBtn = document.getElementById("toggle-mic");
        const camBtn = document.getElementById("toggle-camera");
        const finishBtn = document.getElementById("finish-call");

        createRoomBtn.addEventListener("click", createRoom);
        copyLinkBtn.addEventListener("click", copyInviteLink);
        enterRoomBtn.addEventListener("click", enterRoom);
        newRoomBtn.addEventListener("click", () => location.href = "/");
        finishBtn.addEventListener("click", hangup);
        micBtn.addEventListener("click", toggleMic);
        camBtn.addEventListener("click", toggleCamera);

        init();

        async function init() {
            await loadConfig();

            if (room && token) {
                roomLink.value = publicUrl(location.pathname + location.search);
                showInvitePanel();
                await enterRoom();
            }
        }

        async function loadConfig() {
            try {
                const res = await fetch("/api/config");
                appConfig = await res.json();
                console.log("[p2pcall] ice servers", appConfig.iceServers);
            } catch (err) {
                console.warn("config load failed, using browser origin", err);
            }
        }

        async function createRoom() {
            const res = await fetch("/api/room");
            const data = await res.json();

            const url = publicUrl(data.url + "&join=1");
            roomLink.value = url;

            history.pushState(null, "", data.url);

            room = data.room;
            token = data.token;

            showInvitePanel();
        }

        function showInvitePanel() {
            homePanel.classList.add("hidden");
            invitePanel.classList.remove("hidden");
        }

        function publicUrl(path) {
            return (appConfig.baseUrl || location.origin) + path;
        }

        async function copyInviteLink() {
            await navigator.clipboard.writeText(roomLink.value);
            copyLinkBtn.textContent = "Скопировано";
        }

        async function enterRoom() {
            document.body.classList.add("in-room");
            roomView.dataset.debug = new URLSearchParams(location.search).has("debug") ? "true" : "false";
            setStatus("Подготовка камеры");
            connectWS();

            try {
                await preparePeerConnection();
            } catch {
                return;
            }

            callRequested = true;
            if (!isPolitePeer() && ws.readyState === WebSocket.OPEN) {
                await sendOffer();
            }
        }

        function connectWS() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                return;
            }

            const proto = location.protocol === "https:" ? "wss" : "ws";
            ws = new WebSocket(`${proto}://${location.host}/ws?room=${room}&token=${token}`);

            ws.onopen = async () => {
                debug("WebSocket opened");
                setStatus(isPolitePeer() ? "Ожидание приглашения" : "Ожидание собеседника");
                if (!isPolitePeer() && callRequested && pc) {
                    await sendOffer();
                }
            };

            ws.onerror = (event) => {
                console.error("ws error", event);
                setStatus("Ошибка signaling");
            };

            ws.onclose = (event) => {
                debug(`WebSocket closed: ${event.code}`);
                setStatus(`Signaling закрыт: ${event.code}`);
            };

            ws.onmessage = async (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === "peer-joined") {
                    debug("peer joined");

                    if (!isPolitePeer() && callRequested) {
                        await preparePeerConnection();
                        await sendOffer();
                    }

                    return;
                }

                if (msg.type === "offer") {
                    debug("offer received");
                    await preparePeerConnection();

                    const offerCollision = makingOffer || pc.signalingState !== "stable";
                    ignoreOffer = offerCollision && !isPolitePeer();

                    if (ignoreOffer) {
                        debug("ignored colliding offer");
                        return;
                    }

                    await pc.setRemoteDescription(msg.data);
                    await flushPendingIceCandidates();

                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);

                    sendSignal("answer", answer);
                    setStatus("Ответ отправлен");
                }

                if (msg.type === "answer") {
                    debug("answer received");
                    if (!pc) {
                        console.warn("answer received before peer connection");
                        return;
                    }

                    await pc.setRemoteDescription(msg.data);
                    await flushPendingIceCandidates();
                }

                if (msg.type === "ice") {
                    await addIceCandidate(msg.data);
                }
            };
        }

        async function preparePeerConnection() {
            if (pc) {
                return pc;
            }

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus("Откройте сайт через HTTPS");
                throw new Error("getUserMedia requires HTTPS");
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });
            } catch (err) {
                console.error("getUserMedia failed", err);
                setStatus("Камера или микрофон недоступны");
                throw err;
            }

            localVideo.srcObject = localStream;
            await localVideo.play().catch(() => { });

            remoteStream = new MediaStream();
            remoteVideo.srcObject = remoteStream;

            pc = new RTCPeerConnection({
                iceServers: appConfig.iceServers
            });

            localStream.getTracks().forEach(track => {
                debug(`local track: ${track.kind}`);
                pc.addTrack(track, localStream);
            });

            pc.ontrack = (event) => {
                debug(`remote track: ${event.track.kind}`);
                remoteStream.addTrack(event.track);
                waitingEl.style.display = "none";
                setStatus("В звонке");
                remoteVideo.play().catch((err) => {
                    console.error("remote video play failed", err);
                    setStatus("Нажмите play на видео");
                });
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    debug(`ICE candidate: ${event.candidate.type || "candidate"}`);
                    sendSignal("ice", event.candidate);
                }
            };

            pc.oniceconnectionstatechange = () => {
                debug(`ICE: ${pc.iceConnectionState}`);
                if (pc.iceConnectionState === "connected" || pc.iceConnectionState === "completed") {
                    setStatus("В звонке");
                } else if (pc.iceConnectionState === "failed") {
                    setStatus("ICE failed");
                } else {
                    setStatus(`ICE: ${pc.iceConnectionState}`);
                }
            };

            pc.onconnectionstatechange = () => {
                debug(`connection: ${pc.connectionState}`);
                if (pc.connectionState === "connected") {
                    setStatus("В звонке");
                }
            };

            return pc;
        }

        async function sendOffer() {
            try {
                makingOffer = true;
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
            } finally {
                makingOffer = false;
            }

            sendSignal("offer", pc.localDescription);
        }

        function sendSignal(type, data) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(JSON.stringify({
                type,
                room,
                token,
                data
            }));
        }

        async function addIceCandidate(candidate) {
            if (!pc || !pc.remoteDescription) {
                pendingIceCandidates.push(candidate);
                return;
            }

            try {
                await pc.addIceCandidate(candidate);
            } catch (err) {
                if (!ignoreOffer) {
                    console.error("addIceCandidate failed", err);
                }
            }
        }

        function isPolitePeer() {
            return new URLSearchParams(location.search).has("join");
        }

        function setStatus(text) {
            statusEl.textContent = text;
        }

        function debug(text) {
            console.log(`[p2pcall] ${text}`);
            debugEl.textContent = text;
        }

        async function flushPendingIceCandidates() {
            const candidates = pendingIceCandidates;
            pendingIceCandidates = [];

            for (const candidate of candidates) {
                await addIceCandidate(candidate);
            }
        }

        function toggleMic() {
            const track = localStream?.getAudioTracks()[0];
            if (!track) return;

            track.enabled = !track.enabled;
            micBtn.classList.toggle("call-btn-off", !track.enabled);
            micBtn.title = track.enabled ? "Выключить микрофон" : "Включить микрофон";
        }

        function toggleCamera() {
            const track = localStream?.getVideoTracks()[0];
            if (!track) return;

            track.enabled = !track.enabled;
            camBtn.classList.toggle("call-btn-off", !track.enabled);
            camBtn.title = track.enabled ? "Выключить камеру" : "Включить камеру";
        }

        function hangup() {
            callRequested = false;
            pendingIceCandidates = [];

            if (pc) {
                pc.close();
                pc = null;
            }

            if (ws) {
                ws.close();
                ws = null;
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            if (remoteStream) {
                remoteStream.getTracks().forEach(track => track.stop());
                remoteStream = null;
            }

            localVideo.srcObject = null;
            remoteVideo.srcObject = null;
            waitingEl.style.display = "";
            document.body.classList.remove("in-room");
            showInvitePanel();
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

</body>

</html>
